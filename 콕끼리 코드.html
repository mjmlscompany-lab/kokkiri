<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콕끼리 전적판</title>
    <style>
        :root { --primary: #3498db; --win: #2ecc71; --dark: #2c3e50; --bg: #f1f4f7; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .wrapper { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: row; gap: 20px; flex-wrap: wrap; }
        .main-board { flex: 1; min-width: 320px; }
        .side-bar { width: 320px; }
        @media (max-width: 1024px) { .side-bar { width: 100%; } }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin: 0 0 20px 0; color: var(--dark); border-left: 5px solid var(--primary); padding-left: 12px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        @media (max-width: 850px) { .match-grid { grid-template-columns: 1fr; } }
        .set-row { border: 2px solid #edf2f7; border-radius: 15px; padding: 20px 15px 15px; background: #fff; position: relative; }
        .set-label { position: absolute; top: -12px; left: 15px; background: var(--primary); color: white; padding: 2px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .team-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .team-area { padding: 10px; border-radius: 12px; background: #f8fafc; border: 2px solid transparent; text-align: center; }
        .team-area.selected { background: #eafaf1; border-color: var(--win); }
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 14px; }
        .record-btn { width: 100%; padding: 15px 5px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #718096; }
        .record-btn.active { background: var(--win); color: white; border-color: var(--win); }
        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table th { background: #edf2f7; padding: 10px; font-size: 0.8rem; }
        .rank-table td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .apply-all { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-board">
        <div class="card">
            <h2>🎾 경기 결과 자율 기록 (SET 1-6)</h2>
            <div class="match-grid" id="matchContainer"></div>
            <button class="apply-all" onclick="confirmAndSave()">전적 합산하기</button>
        </div>
    </div>
    <div class="side-bar">
        <div class="card">
            <h3>실시간 순위</h3>
            <table class="rank-table">
                <thead><tr><th>순위</th><th>이름</th><th>승</th><th>패</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
            <button onclick="resetData()" style="margin-top:20px; font-size:11px; color:#ccc; background:none; border:none; cursor:pointer;">데이터 초기화</button>
        </div>
    </div>
</div>

<script>
    const initialPlayers = [
        {name: "시오", seed: "A"}, {name: "C코", seed: "A"}, {name: "로토", seed: "B+"}, 
        {name: "뉴키", seed: "B+"}, {name: "야키", seed: "B0"}, {name: "구름", seed: "B0"},
        {name: "제리", seed: "B0"}, {name: "백구", seed: "B0"}, {name: "데식", seed: "B0"},
        {name: "단우", seed: "B0"}, {name: "구구", seed: "B0"}, {name: "후니", seed: "C"},
        {name: "현이", seed: "C"}, {name: "이름없어요", seed: "C"}, {name: "우민", seed: "C"},
        {name: "슝슝이", seed: "C"}, {name: "솔찬", seed: "C"}, {name: "새로", seed: "C"},
        {name: "따순", seed: "C"}, {name: "곽동칠", seed: "C"}, {name: "죠스", seed: "D"},
        {name: "동구", seed: "D"}, {name: "란지", seed: "D"}, {name: "리버", seed: "E+"},
        {name: "무지", seed: "E-"}, {name: "완태", seed: "E-"}, {name: "루피", seed: "E-"}
    ].map(p => ({...p, wins: 0, losses: 0}));

    let players = JSON.parse(localStorage.getItem('kok-final-v3')) || initialPlayers;
    let winners = Array(6).fill(null);

    function initBoard() {
        const container = document.getElementById('matchContainer');
        let html = '';
        for(let i=1; i<=6; i++) {
            html += `
                <div class="set-row">
                    <div class="set-label">SET ${i}</div>
                    <div class="team-container">
                        <div class="team-area" id="set${i}-t0">
                            <div class="player-grid">${[1,2,3,4].map(p => `<select id="s${i}-t0-p${p}"></select>`).join('')}</div>
                            <button class="record-btn" id="btn${i}-0" onclick="markWinner(${i}, 0)">A팀 승리</button>
                        </div>
                        <div class="team-area" id="set${i}-t1">
                            <div class="player-grid">${[1,2,3,4].map(p => `<select id="s${i}-t1-p${p}"></select>`).join('')}</div>
                            <button class="record-btn" id="btn${i}-1" onclick="markWinner(${i}, 1)">B팀 승리</button>
                        </div>
                    </div>
                </div>`;
        }
        container.innerHTML = html;
        refreshSelects();
    }

    function markWinner(setNum, teamIdx) {
        winners[setNum-1] = teamIdx;
        [0,1].forEach(t => {
            document.getElementById(`btn${setNum}-${t}`).classList.toggle('active', teamIdx === t);
            document.getElementById(`set${setNum}-t${t}`).classList.toggle('selected', teamIdx === t);
        });
    }

    function refreshSelects() {
        const opts = '<option value="">선수</option>' + players.map(p => `<option value="${p.name}">${p.name}(${p.seed})</option>`).join('');
        document.querySelectorAll('select').forEach(s => { const val = s.value; s.innerHTML = opts; s.value = val; });
    }

    function confirmAndSave() {
        if(winners.every(w => w === null)) return alert("결과가 없습니다.");
        for(let i=1; i<=6; i++) {
            if(winners[i-1] === null) continue;
            const t0 = [1,2,3,4].map(p => document.getElementById(`s${i}-t0-p${p}`).value).filter(n => n);
            const t1 = [1,2,3,4].map(p => document.getElementById(`s${i}-t1-p${p}`).value).filter(n => n);
            const winTeam = winners[i-1] === 0 ? t0 : t1;
            const lossTeam = winners[i-1] === 0 ? t1 : t0;
            winTeam.forEach(n => { const p = players.find(m => m.name === n); if(p) p.wins++; });
            lossTeam.forEach(n => { const p = players.find(m => m.name === n); if(p) p.losses++; });
        }
        renderRank();
        alert("저장되었습니다.");
        location.reload();
    }

    function renderRank() {
        players.sort((a, b) => b.wins - a.wins);
        document.getElementById('rankBody').innerHTML = players.map((p, i) => `
            <tr><td>${i+1}</td><td><strong>${p.name}</strong> <small>(${p.seed})</small></td><td style="color:green">${p.wins}</td><td>${p.losses}</td></tr>
        `).join('');
        localStorage.setItem('kok-final-v3', JSON.stringify(players));
    }

    function resetData() {
        if(confirm("초기화하시겠습니까?")) { localStorage.removeItem('kok-final-v3'); location.reload(); }
    }

    initBoard();
    renderRank();
</script>
</body>
</html>
